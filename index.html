const MEDD_LABELS = {M:'Metrics',E:'Economic Buyer',Dc:'Decision Criteria',Dp:'Decision Process',P:'Paper Process',I:'Identified Pain',Ch:'Champion',Co:'Competition',Ce:'Compelling Event',Cp:'Closing Plan'};
const MEDD_COLORS = {M:'#1a6644',E:'#1a3a5c',Dc:'#5a3a9a',Dp:'#5a3a9a',P:'#8b3a1f',I:'#8b1f1f',Ch:'#7a4a00',Co:'#555',Ce:'#7a2a5a',Cp:'#1a3a5c'};

let filters = {rep:'all',signal:'all',stage:'all',search:''};
let currentView = 'exec';

function q2color(s){return s==='green'?'var(--green)':s==='amber'?'var(--gold)':'var(--red)';}
function q2bg(s){return s==='green'?'var(--green-light)':s==='amber'?'var(--amber-light)':'var(--red-light)';}
function q2border(s){return s==='green'?'#b8d9c8':s==='amber'?'#f0d9a8':'#f0c0c0';}
function sc(s){return s>=70?'var(--green)':s>=50?'var(--amber)':'var(--red)';}
function tc(s){return s>=60?'var(--purple)':s>=35?'var(--amber)':'var(--red)';}
function fmtArr(v){if(!v||v===0)return '—';return '$'+Number(v).toLocaleString();}
function spClass(s){return 'sp-'+(s||'na');}
function spLabel(s){return{strong:'Strong',partial:'Partial',missing:'Missing',na:'N/A'}[s]||'N/A';}
function aiClass(s){return{sharp:'ai-sharp',partially_sharp:'ai-partial',generic:'ai-generic','n/a':'ai-na'}[s]||'ai-na';}
function aiPillClass(s){return{sharp:'p-sharp',partially_sharp:'p-partial',generic:'p-generic','n/a':'p-na'}[s]||'p-na';}
function aiLabel(s){return{sharp:'Sharp ✓',partially_sharp:'Partially Sharp',generic:'Generic ✗','n/a':'Not Raised'}[s]||s;}

// Init badges
const closeable = CALLS.filter(c=>c.q2_signal==='green').length;
const possible = CALLS.filter(c=>c.q2_signal==='amber').length;
document.getElementById('q2-badge').textContent = `Q2: ${closeable}🟢 ${possible}🟡`;

function getFiltered(){
  return CALLS.filter(c=>{
    if(filters.rep!=='all' && c.rep!==filters.rep) return false;
    if(filters.signal!=='all' && c.q2_signal!==filters.signal) return false;
    if(filters.stage!=='all' && c.sf_stage!==filters.stage) return false;
    if(filters.search){
      const s=filters.search.toLowerCase();
      if(!c.account.toLowerCase().includes(s) && !c.rep.toLowerCase().includes(s)) return false;
    }
    return true;
  });
}

function applyFilters(){
  filters.rep=document.getElementById('f-rep')?.value||'all';
  filters.signal=document.getElementById('f-signal')?.value||'all';
  filters.stage=document.getElementById('f-stage')?.value||'all';
  filters.search=document.getElementById('f-search')?.value||'';
  if(currentView==='exec') renderExec();
  else if(currentView==='calls') renderCalls();
  else renderCoaching();
}

function showView(v,el){
  currentView=v;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('on'));
  if(el) el.classList.add('on');
  if(v==='exec') renderExec();
  else if(v==='calls') renderCalls();
  else renderCoaching();
}

function renderFilterBar(filtered){
  const reps=[...new Set(CALLS.map(c=>c.rep))].filter(Boolean).sort();
  const stages=[...new Set(CALLS.map(c=>c.sf_stage))].filter(Boolean).sort();
  return `<div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <select class="filter-select" id="f-rep" onchange="applyFilters()">
      <option value="all">All Reps</option>
      ${reps.map(r=>`<option value="${r}" ${filters.rep===r?'selected':''}>${r}</option>`).join('')}
    </select>
    <select class="filter-select" id="f-signal" onchange="applyFilters()">
      <option value="all">All Signals</option>
      <option value="green" ${filters.signal==='green'?'selected':''}>🟢 Closeable</option>
      <option value="amber" ${filters.signal==='amber'?'selected':''}>🟡 Possible</option>
      <option value="red" ${filters.signal==='red'?'selected':''}>🔴 Unlikely</option>
    </select>
    <select class="filter-select" id="f-stage" onchange="applyFilters()">
      <option value="all">All Stages</option>
      ${stages.map(s=>`<option value="${s}" ${filters.stage===s?'selected':''}>${s}</option>`).join('')}
    </select>
    <input type="text" class="filter-search" id="f-search" placeholder="Search account or rep..." value="${filters.search}" oninput="applyFilters()">
    <span class="filter-count">${filtered.length} deals</span>
  </div>`;
}

function renderExec(){
  const filtered=getFiltered();
  const green=filtered.filter(c=>c.q2_signal==='green');
  const amber=filtered.filter(c=>c.q2_signal==='amber');
  const red=filtered.filter(c=>c.q2_signal==='red');
  const gArr=green.reduce((a,c)=>a+(c.estimated_arr||0),0);
  const aArr=amber.reduce((a,c)=>a+(c.estimated_arr||0),0);
  const reps=[...new Set(filtered.map(c=>c.rep))].filter(Boolean);
  const avgScore=filtered.length?Math.round(filtered.reduce((a,c)=>a+(c.overall_score||0),0)/filtered.length):0;

  document.getElementById('main').innerHTML=`
    <div class="exec-header">
      <div class="exec-title">Deal Dashboard</div>
      <div class="exec-sub">Q2 2026 Pipeline · 13 real Intralinks calls · AI-analyzed</div>
    </div>
    ${renderFilterBar(filtered)}
    <div class="kpi-strip">
      <div class="kpi k-green"><div class="kpi-num" style="color:var(--green)">${green.length}</div><div class="kpi-label">Closeable Q2<br>${fmtArr(gArr)}</div></div>
      <div class="kpi k-amber"><div class="kpi-num" style="color:var(--gold)">${amber.length}</div><div class="kpi-label">Possible Q2<br>${fmtArr(aArr)}</div></div>
      <div class="kpi k-red"><div class="kpi-num" style="color:var(--red)">${red.length}</div><div class="kpi-label">Unlikely Q2</div></div>
      <div class="kpi k-blue"><div class="kpi-num" style="color:var(--accent)">${fmtArr(gArr+aArr)}</div><div class="kpi-label">Q2 Pipeline ARR</div></div>
      <div class="kpi k-purple"><div class="kpi-num" style="color:var(--purple)">${reps.length}</div><div class="kpi-label">Active Reps</div></div>
      <div class="kpi k-grey"><div class="kpi-num" style="color:${sc(avgScore)}">${avgScore}</div><div class="kpi-label">Avg Call Score</div></div>
    </div>
    ${renderQ2Section('🟢 Closeable Q2',green,'green')}
    ${renderQ2Section('🟡 Possible Q2',amber,'amber')}
    ${renderQ2Section('🔴 Unlikely Q2',red,'red')}`;
}

  const arr=calls.reduce((a,c)=>a+(c.estimated_arr||0),0);
  return `<div class="q2-section">

      <div class="q2-dot" style="background:${q2color(signal)}"></div>
      <div class="q2-section-title">${title}</div>
      <div class="q2-section-count">${calls.length} deal${calls.length!==1?'s':''}</div>
      ${arr>0?`<div class="q2-section-arr" style="color:${q2color(signal)}">${fmtArr(arr)}</div>`:''}
    </div>
    <table class="deal-table">
      <thead><tr>
        <th>Account</th><th>Rep</th><th>Stage</th><th>ARR</th><th>Score</th><th>AI Story</th><th>Signal</th>
      </tr></thead>
      <tbody>
        ${calls.map(c=>`<tr onclick="openPanel(${JSON.stringify(c.account).replace(/"/g,'&quot;')})">
          <td><div class="tbl-account">${c.account}</div><div class="tbl-rep">${c.date}</div></td>
          <td><div class="tbl-rep">${c.rep}</div></td>
          <td><span class="tbl-stage">${c.sf_stage}</span></td>
          <td class="tbl-arr">${fmtArr(c.estimated_arr)}</td>

          <td><span class="ai-pill ${aiPillClass(c.ai_story?.sharp_or_generic)}">${aiLabel(c.ai_story?.sharp_or_generic)}</span></td>

      </tbody>
    </table>
  </div>`;
}

    <div class="p-summ">
      <div class="p-summ-label">Deal Context</div>
      <div class="p-summ-text" style="font-size:11px;color:var(--ink-3);font-family:'DM Mono',monospace;margin-bottom:8px">${c.deal_context||''}</div>
      <div class="p-summ-label">Coaching Summary</div>
      <div class="p-summ-text">${c.summary||''}</div>
    </div>

    ${ai.how_handled?`<div class="ai-block ${aiClass(ai.sharp_or_generic||'n/a')}">
      <div class="ai-hdr"><div class="ai-title">🤖 AI Story</div><span class="ai-pill ${aiPillClass(ai.sharp_or_generic||'n/a')}">${aiLabel(ai.sharp_or_generic||'n/a')}</span></div>
      <div class="ai-body">${ai.how_handled}</div>
      <div class="ai-coach-block">${ai.coaching||''}</div>
    </div>`:''}

    <div class="p-two-col">
      <div class="p-wins"><div class="p-col-label">✓ Top Wins</div>${(c.top_wins||[]).map(w=>`<div class="p-li"><div class="p-li-dot dot-g"></div><div>${w}</div></div>`).join('')}</div>
      <div class="p-pris"><div class="p-col-label">↑ Top Priorities</div>${(c.top_priorities||[]).map(p=>`<div class="p-li"><div class="p-li-dot dot-a"></div><div>${p}</div></div>`).join('')}</div>
    </div>

    ${c.top_multithread_action?`<div class="multithread-box">
      <div class="mt-label">🔗 Top Multi-Thread Action</div>
      <div class="mt-action">${c.top_multithread_action}</div>
    </div>`:''}

    ${c.suggested_next_step?`<div class="p-nxt">
      <div class="p-nxt-label">Suggested Next Step</div>
      <div class="p-nxt-text" id="p-nst">${c.suggested_next_step}</div>
      <button class="p-copy" onclick="copyNST()">Copy</button>
    </div>`:''}

    <div class="p-tabs">
      <button class="p-tab on" onclick="switchPTab('medd',this)">MEDDPICCCC</button>
      <button class="p-tab" onclick="switchPTab('vf',this)">Value vs Feature</button>
      <button class="p-tab" onclick="switchPTab('tr',this)">Transition & Threading</button>
    </div>

    <div class="p-tab-section show" id="ptab-medd">
      ${Object.entries(MEDD_LABELS).map(([k,l])=>{
        const st=scores[k]||'na';const co=coaching[k]||'';
        return `<div class="p-fw-item">
          <div class="p-fw-key" style="color:${MEDD_COLORS[k]||'#333'}">${k}</div>
          <div>
            <div class="p-fw-hdr"><div class="p-fw-lbl">${l}</div><span class="sp ${spClass(st)}">${spLabel(st)}</span></div>
            ${co?`<div class="p-coach p-coach-${st}">${co}</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="p-tab-section" id="ptab-vf">
      <div style="background:var(--surface);border-radius:6px;padding:14px;margin-bottom:10px">
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-4);text-transform:uppercase;margin-bottom:6px">Value vs Feature Score</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:8px">${c.value_vs_feature?.score==='value_led'?'✅ Value-Led':c.value_vs_feature?.score==='feature_led'?'❌ Feature-Led':'⚠️ Mixed'}</div>
        <div style="font-size:12px;color:var(--ink-2);line-height:1.6;margin-bottom:8px">${c.value_vs_feature?.evidence||''}</div>
        <div style="background:var(--amber-light);border-left:2px solid var(--gold);padding:8px 10px;border-radius:3px;font-size:11px;color:var(--amber)">${c.value_vs_feature?.coaching||''}</div>
      </div>
    </div>

    <div class="p-tab-section" id="ptab-tr">
      <div style="background:var(--surface);border-radius:7px;padding:14px;margin-bottom:10px">
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-4);text-transform:uppercase;margin-bottom:4px">Transition Score · VDR → DCAI/FundCentre</div>
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:${tc(ts)}">${ts}</div>
        <div style="font-size:12px;color:var(--ink-2);margin-top:4px">${c.transition_summary||''}</div>
      </div>
      <div style="background:var(--purple-light);border-radius:7px;padding:14px">
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--purple);text-transform:uppercase;margin-bottom:4px">Multi-Thread Score</div>
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:${tc(mts)}">${mts}</div>
        <div style="font-size:12px;color:var(--ink-2);margin-top:4px">${c.multithread_summary||''}</div>
      </div>
    </div>`;
}

function switchPTab(tab,btn){
  document.querySelectorAll('.p-tab-section').forEach(s=>s.classList.remove('show'));
  document.querySelectorAll('.p-tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('ptab-'+tab)?.classList.add('show');
  btn.classList.add('on');
}

function closePanel(){
  document.getElementById('panel-overlay').classList.remove('show');
  document.getElementById('coaching-panel').classList.remove('open');
}

function copyNST(){
  const t=document.getElementById('p-nst')?.innerText||'';
  navigator.clipboard.writeText(t).catch(()=>{});
  const b=document.querySelector('.p-copy');
  if(b){b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1500);}
}

// Init
renderExec();
</script>
</body>
</html>
