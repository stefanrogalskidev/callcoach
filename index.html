<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CallCoach — Intralinks Sales Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0f0f;
    --ink-2: #3a3a3a;
    --ink-3: #6b6b6b;
    --ink-4: #9b9b9b;
    --paper: #fafaf8;
    --surface: #f3f2ef;
    --surface-2: #e8e6e1;
    --rule: #dddbd5;
    --accent: #1a3a5c;
    --accent-light: #e8eef5;
    --green: #1a6644;
    --green-light: #e6f2ec;
    --amber: #7a4a00;
    --amber-light: #fdf3e3;
    --red: #8b1f1f;
    --red-light: #fdeaea;
    --gold: #b8860b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--ink);
    padding: 0 40px;
    display: flex;
    align-items: center;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #222;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.01em;
  }
  .logo span { color: #7eb3e0; }
  .header-meta {
    margin-left: 24px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #666;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding-left: 24px;
    border-left: 1px solid #333;
  }
  .header-badge {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 3px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .badge-blue { background: #1a3a5c; color: #7eb3e0; }
  .badge-green { background: #1a3a2a; color: #5cb88a; }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 60px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--ink);
    padding: 0;
    border-right: 1px solid #222;
    position: sticky;
    top: 60px;
    height: calc(100vh - 60px);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .sidebar-section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 20px 24px 10px;
  }
  .call-nav-item {
    padding: 16px 24px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    border-bottom: 1px solid #1a1a1a;
  }
  .call-nav-item:hover { background: #111; }
  .call-nav-item.active {
    background: #111;
    border-left-color: #7eb3e0;
  }
  .nav-customer {
    font-weight: 500;
    font-size: 13px;
    color: #ddd;
    margin-bottom: 2px;
  }
  .nav-rep {
    font-size: 11px;
    color: #666;
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }
  .nav-score-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-score {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
  }
  .nav-score-bar {
    flex: 1;
    height: 3px;
    background: #2a2a2a;
    border-radius: 2px;
    overflow: hidden;
  }
  .nav-score-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .sidebar-footer {
    margin-top: auto;
    padding: 20px 24px;
    border-top: 1px solid #1a1a1a;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #444;
    letter-spacing: 0.05em;
    line-height: 1.8;
  }

  /* ── MAIN CONTENT ── */
  .main {
    padding: 40px 48px;
    max-width: 860px;
  }

  /* ── CALL HEADER ── */
  .call-header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule);
  }
  .call-meta-row {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 6px;
  }
  .call-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .call-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--ink-4);
  }
  .call-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 4px;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .call-subtitle {
    font-size: 13px;
    color: var(--ink-3);
    font-family: 'DM Mono', monospace;
  }

  /* ── SCORE STRIP ── */
  .score-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .score-card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 16px 20px;
    text-align: center;
  }
  .score-number {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .score-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  /* ── SUMMARY BLOCK ── */
  .summary-block {
    background: var(--accent-light);
    border: 1px solid #c5d8eb;
    border-left: 4px solid var(--accent);
    border-radius: 6px;
    padding: 18px 20px;
    margin-bottom: 28px;
  }
  .summary-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .summary-text {
    font-size: 14px;
    color: var(--ink-2);
    line-height: 1.75;
  }
  .context-text {
    font-size: 12px;
    color: var(--ink-3);
    font-family: 'DM Mono', monospace;
    margin-bottom: 10px;
    line-height: 1.6;
  }

  /* ── WINS & PRIORITIES ── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 28px;
  }
  .wins-card, .priorities-card {
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 18px 20px;
  }
  .wins-card { background: var(--green-light); border-color: #b8d9c8; }
  .priorities-card { background: var(--amber-light); border-color: #f0d9a8; }
  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .wins-card .card-label { color: var(--green); }
  .priorities-card .card-label { color: var(--amber); }
  .list-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    font-size: 13px;
    line-height: 1.55;
    padding: 6px 0;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    color: var(--ink-2);
  }
  .list-item:last-child { border-bottom: none; }
  .list-dot { flex-shrink: 0; margin-top: 6px; width: 6px; height: 6px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-amber { background: var(--gold); }

  /* ── NEXT STEP ── */
  .next-step-block {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-left: 4px solid var(--accent);
    border-radius: 6px;
    padding: 18px 20px;
    margin-bottom: 32px;
    position: relative;
  }
  .next-step-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .next-step-text {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.75;
    font-style: italic;
  }
  .copy-btn {
    position: absolute;
    top: 14px;
    right: 14px;
    background: white;
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 4px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-3);
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--surface); color: var(--accent); border-color: var(--accent); }

  /* ── FRAMEWORK TABS ── */
  .framework-tabs {
    display: flex;
    border-bottom: 2px solid var(--rule);
    margin-bottom: 24px;
    gap: 0;
  }
  .tab-btn {
    background: none;
    border: none;
    padding: 10px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink-3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 600;
  }

  /* ── FRAMEWORK ITEMS ── */
  .framework-section { display: none; }
  .framework-section.active { display: block; }

  .medd-item {
    padding: 18px 0;
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: 52px 1fr;
    gap: 16px;
    align-items: start;
  }
  .medd-item:last-child { border-bottom: none; }
  .medd-key {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    line-height: 1;
    padding-top: 2px;
  }
  .medd-body {}
  .medd-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .medd-label {
    font-weight: 600;
    font-size: 14px;
    color: var(--ink);
    flex: 1;
  }
  .status-pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 3px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 500;
  }
  .status-strong { background: var(--green-light); color: var(--green); border: 1px solid #b8d9c8; }
  .status-partial { background: var(--amber-light); color: var(--amber); border: 1px solid #f0d9a8; }
  .status-missing { background: var(--red-light); color: var(--red); border: 1px solid #f0c0c0; }
  .status-na { background: var(--surface); color: var(--ink-3); border: 1px solid var(--rule); }

  .evidence-block {
    background: var(--surface);
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 12.5px;
    color: var(--ink-3);
    line-height: 1.65;
    margin-bottom: 8px;
    border-left: 3px solid var(--surface-2);
  }
  .evidence-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-4);
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .coaching-block {
    border-radius: 4px;
    padding: 10px 14px;
    font-size: 12.5px;
    line-height: 1.65;
    border-left: 3px solid;
  }
  .coaching-block.coaching-strong { background: var(--green-light); border-color: #5cb88a; color: #1a3d2a; }
  .coaching-block.coaching-partial,
  .coaching-block.coaching-missing { background: var(--amber-light); border-color: var(--gold); color: var(--amber); }
  .coaching-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 3px;
    opacity: 0.7;
  }

  /* ── SECTION DIVIDER ── */
  .section-divider {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--ink-4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 24px 0 14px;
    border-top: 1px solid var(--rule);
    margin-top: 4px;
  }
  .section-divider:first-of-type { border-top: none; padding-top: 0; }

  /* ── OVERVIEW PAGE ── */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 40px;
  }
  .overview-card {
    background: white;
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .overview-card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 24px rgba(26,58,92,0.1);
    transform: translateY(-2px);
  }
  .overview-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .ov-score { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .ov-customer { font-size: 15px; font-weight: 600; margin-bottom: 2px; color: var(--ink); }
  .ov-rep { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--ink-3); margin-bottom: 14px; }
  .ov-bar { height: 4px; background: var(--surface-2); border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
  .ov-bar-fill { height: 100%; border-radius: 2px; }
  .ov-context { font-size: 12px; color: var(--ink-3); line-height: 1.5; }

  .overview-header { margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--rule); }
  .overview-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
  .overview-subtitle { font-size: 14px; color: var(--ink-3); }

  .insight-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .insight-card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 16px 18px;
  }
  .insight-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .insight-label { font-size: 12px; color: var(--ink-3); }

  .theme-section { margin-bottom: 32px; }
  .theme-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; margin-bottom: 16px; color: var(--ink); }
  .theme-item {
    display: flex;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-2);
  }
  .theme-item:last-child { border-bottom: none; }
  .theme-icon { flex-shrink: 0; font-size: 16px; margin-top: 1px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; top: 0; }
    .main { padding: 24px 20px; }
    .overview-grid { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .score-strip { grid-template-columns: repeat(3, 1fr); }
    .insight-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">Call<span>Coach</span></div>
  <div class="header-meta">Intralinks · Sales Intelligence · May 2026</div>
  <div class="header-badge">
    <span class="badge badge-blue">3 Calls</span>
    <span class="badge badge-green">Prototype</span>
  </div>
</header>

<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-section-label">Calls Analyzed</div>

    <div class="call-nav-item active" onclick="showOverview(this)">
      <div class="nav-customer" style="color:#7eb3e0;">↗ Team Overview</div>
      <div class="nav-rep" style="color:#555;">3 calls · May 2026</div>
      <div class="nav-score-row">
        <span class="nav-score" style="color:#7eb3e0;">─</span>
      </div>
    </div>

    <div id="nav-calls"></div>

    <div class="sidebar-footer">
      Frameworks:<br>
      MEDDPICCCC · Command of the Message<br><br>
      Powered by Claude · Confidential
    </div>
  </nav>

  <main class="main" id="main-content">
    <!-- injected by JS -->
  </main>
</div>

<script src="data.js"></script>
<script>
// ── UTILITIES ──
function scoreColor(s) {
  if (s >= 70) return '#1a6644';
  if (s >= 50) return '#7a4a00';
  return '#8b1f1f';
}
function scoreBg(s) {
  if (s >= 70) return '#e6f2ec';
  if (s >= 50) return '#fdf3e3';
  return '#fdeaea';
}
function calcFrameworkScore(obj) {
  if (!obj) return 0;
  const vals = Object.values(obj);
  const pts = vals.reduce((a, v) => a + (v.status === 'strong' ? 10 : v.status === 'partial' ? 5 : v.status === 'na' ? 10 : 0), 0);
  return Math.round((pts / (vals.length * 10)) * 100);
}
function statusClass(s) {
  return 'status-' + s;
}
function statusLabel(s) {
  return { strong: 'Strong', partial: 'Partial', missing: 'Missing', na: 'N/A' }[s] || s;
}

const MEDD_META = {
  M: 'Metrics', E: 'Economic Buyer', Dc: 'Decision Criteria', Dp: 'Decision Process',
  P: 'Paper Process', I: 'Identified Pain', Ch: 'Champion', Co: 'Competition',
  Ce: 'Compelling Event', Cp: 'Closing Plan'
};
const COM_META = {
  pbos: 'Positive Business Outcomes', ri: 'Required Capabilities',
  metrics: 'Metrics / Value', discovery: 'Discovery Questions',
  objections: 'Objection Handling', next_steps: 'Next Steps & Commitment'
};

// ── SIDEBAR POPULATION ──
function buildSidebar() {
  const container = document.getElementById('nav-calls');
  CALL_DATA.forEach((call, i) => {
    const s = call.overall_score;
    const col = scoreColor(s);
    const item = document.createElement('div');
    item.className = 'call-nav-item';
    item.onclick = function() { showCall(i, this); };
    item.innerHTML = `
      <div class="nav-customer">${call.customer}</div>
      <div class="nav-rep">${call.rep_name}</div>
      <div class="nav-score-row">
        <span class="nav-score" style="color:${col}">${s}</span>
        <div class="nav-score-bar">
          <div class="nav-score-fill" style="width:${s}%;background:${col}"></div>
        </div>
      </div>`;
    container.appendChild(item);
  });
}

// ── OVERVIEW ──
function showOverview(navEl) {
  setActiveNav(navEl);
  const avgScore = Math.round(CALL_DATA.reduce((a, c) => a + c.overall_score, 0) / CALL_DATA.length);
  const strongCounts = CALL_DATA.map(c => {
    return Object.values(c.meddpicccc).filter(v => v.status === 'strong').length +
           Object.values(c.com).filter(v => v.status === 'strong').length;
  });
  const totalStrong = strongCounts.reduce((a, b) => a + b, 0);
  const totalElements = CALL_DATA.length * (10 + 6);
  const missingCounts = CALL_DATA.map(c => {
    return Object.values(c.meddpicccc).filter(v => v.status === 'missing').length +
           Object.values(c.com).filter(v => v.status === 'missing').length;
  });

  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="overview-header">
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:#9b9b9b;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Team Report · May 2026 · 3 Calls</div>
      <div class="overview-title">Sales Coaching Dashboard</div>
      <div class="overview-subtitle">MEDDPICCCC &amp; Command of the Message — Intralinks Sales Team</div>
    </div>

    <div class="insight-row">
      <div class="insight-card">
        <div class="insight-num" style="color:${scoreColor(avgScore)}">${avgScore}</div>
        <div class="insight-label">Average call score</div>
      </div>
      <div class="insight-card">
        <div class="insight-num" style="color:#1a6644">${totalStrong}</div>
        <div class="insight-label">Strong elements (of ${totalElements} total)</div>
      </div>
      <div class="insight-card">
        <div class="insight-num" style="color:#8b1f1f">${missingCounts.reduce((a,b)=>a+b,0)}</div>
        <div class="insight-label">Missing elements across all calls</div>
      </div>
    </div>

    <div class="overview-grid">
      ${CALL_DATA.map((call, i) => `
        <div class="overview-card" onclick="showCall(${i})" style="cursor:pointer">
          <div style="position:absolute;top:0;left:0;right:0;height:3px;background:${scoreColor(call.overall_score)}"></div>
          <div class="ov-score" style="color:${scoreColor(call.overall_score)}">${call.overall_score}</div>
          <div class="ov-customer">${call.customer}</div>
          <div class="ov-rep">${call.rep_name} · ${call.call_date}</div>
          <div class="ov-bar"><div class="ov-bar-fill" style="width:${call.overall_score}%;background:${scoreColor(call.overall_score)}"></div></div>
          <div class="ov-context">${call.deal_context}</div>
        </div>
      `).join('')}
    </div>

    <div class="theme-section">
      <div class="theme-title">Cross-Team Themes</div>
      <div class="theme-item">
        <div class="theme-icon">📊</div>
        <div><strong>Metrics are missing on every call.</strong> No rep quantified value in terms of time saved, cost avoided, or cycle time improvement. The AskLink gym story (Call 2) and Ryan's litigation framing (Call 3) were vivid — but neither was landed with a number. Add one relevant metric to every conversation.</div>
      </div>
      <div class="theme-item">
        <div class="theme-icon">🔚</div>
        <div><strong>Closing discipline is the sharpest gap.</strong> Call 1 ended with an open calendar. Call 2 ended with a gift card offer. Only Call 3 committed to a same-day proposal with a defined path. Every call should end with a specific date and a bilateral commitment.</div>
      </div>
      <div class="theme-item">
        <div class="theme-icon">🔍</div>
        <div><strong>Discovery quality varies dramatically.</strong> Call 3 (Jonathan & Ryan) ran the most disciplined discovery — proactive pain questions, competitive probing, process mapping. Calls 1 and 2 defaulted to feature pitches without sufficient discovery. Discovery is the highest-leverage coaching lever for the team.</div>
      </div>
      <div class="theme-item">
        <div class="theme-icon">🏆</div>
        <div><strong>Champion development is absent on all three calls.</strong> No rep identified or developed an internal advocate. In Calls 1 and 2, the economic buyer and champion are both unknown. Building one internal advocate per account is a structural gap the team needs to close.</div>
      </div>
      <div class="theme-item">
        <div class="theme-icon">⚡</div>
        <div><strong>Compelling events are being left on the table.</strong> Call 1 has a natural compelling event (Anduin contract expiry in ~2 years) that Tim didn't use. Call 2 has none established. Call 3 had the strongest urgency and Jonathan used it well. Reps need to identify or create a compelling event on every call.</div>
      </div>
    </div>
  `;
}

// ── CALL DETAIL ──
function showCall(index, navEl) {
  if (navEl) {
    setActiveNav(navEl);
  } else {
    const navItems = document.querySelectorAll('.call-nav-item');
    navItems.forEach((item, i) => {
      if (i === index + 1) item.classList.add('active');
      else item.classList.remove('active');
    });
  }

  const call = CALL_DATA[index];
  const meddScore = calcFrameworkScore(call.meddpicccc);
  const comScore = calcFrameworkScore(call.com);
  const main = document.getElementById('main-content');

  main.innerHTML = `
    <div class="call-header">
      <div class="call-meta-row">
        <span class="call-number">Call ${index + 1} of ${CALL_DATA.length}</span>
        <span class="call-date">${call.call_date}</span>
      </div>
      <div class="call-title">${call.customer}</div>
      <div class="call-subtitle">${call.rep_name} · ${call.contact}</div>
    </div>

    <div class="score-strip">
      <div class="score-card">
        <div class="score-number" style="color:${scoreColor(call.overall_score)}">${call.overall_score}</div>
        <div class="score-label">Overall Score</div>
      </div>
      <div class="score-card">
        <div class="score-number" style="color:${scoreColor(meddScore)}">${meddScore}</div>
        <div class="score-label">MEDDPICCCC</div>
      </div>
      <div class="score-card">
        <div class="score-number" style="color:${scoreColor(comScore)}">${comScore}</div>
        <div class="score-label">Cmd of Message</div>
      </div>
    </div>

    <div class="summary-block">
      <div class="summary-label">Deal Context</div>
      <div class="context-text">${call.deal_context}</div>
      <div class="summary-label">Coaching Summary</div>
      <div class="summary-text">${call.summary}</div>
    </div>

    <div class="two-col">
      <div class="wins-card">
        <div class="card-label">✓ Top Wins</div>
        ${call.top_wins.map(w => `<div class="list-item"><div class="list-dot dot-green"></div><div>${w}</div></div>`).join('')}
      </div>
      <div class="priorities-card">
        <div class="card-label">↑ Top Priorities</div>
        ${call.top_priorities.map(p => `<div class="list-item"><div class="list-dot dot-amber"></div><div>${p}</div></div>`).join('')}
      </div>
    </div>

    <div class="next-step-block">
      <div class="next-step-label">Suggested Next Step Language</div>
      <div class="next-step-text" id="next-step-text">${call.suggested_next_step}</div>
      <button class="copy-btn" onclick="copyNextStep()">Copy</button>
    </div>

    <div class="framework-tabs">
      <button class="tab-btn active" onclick="switchTab('medd', this)">MEDDPICCCC</button>
      <button class="tab-btn" onclick="switchTab('com', this)">Command of Message</button>
    </div>

    <div class="framework-section active" id="tab-medd">
      ${Object.entries(MEDD_META).map(([key, label]) => {
        const item = call.meddpicccc[key];
        if (!item) return '';
        return `
          <div class="medd-item">
            <div class="medd-key" style="color:${meddKeyColor(key)}">${key}</div>
            <div class="medd-body">
              <div class="medd-header">
                <div class="medd-label">${label}</div>
                <span class="status-pill ${statusClass(item.status)}">${statusLabel(item.status)}</span>
              </div>
              <div class="evidence-block">
                <div class="evidence-label">Evidence</div>
                ${item.evidence}
              </div>
              <div class="coaching-block coaching-${item.status}">
                <div class="coaching-label">${item.status === 'strong' ? 'Note' : 'Coaching'}</div>
                ${item.coaching}
              </div>
            </div>
          </div>`;
      }).join('')}
    </div>

    <div class="framework-section" id="tab-com">
      ${Object.entries(COM_META).map(([key, label]) => {
        const item = call.com[key];
        if (!item) return '';
        return `
          <div class="medd-item">
            <div class="medd-key" style="color:#555;font-size:12px">${comIcon(key)}</div>
            <div class="medd-body">
              <div class="medd-header">
                <div class="medd-label">${label}</div>
                <span class="status-pill ${statusClass(item.status)}">${statusLabel(item.status)}</span>
              </div>
              <div class="evidence-block">
                <div class="evidence-label">Evidence</div>
                ${item.evidence}
              </div>
              <div class="coaching-block coaching-${item.status}">
                <div class="coaching-label">${item.status === 'strong' ? 'Note' : 'Coaching'}</div>
                ${item.coaching}
              </div>
            </div>
          </div>`;
      }).join('')}
    </div>
  `;
}

function meddKeyColor(key) {
  const map = {
    M: '#1a6644', E: '#1a3a5c', Dc: '#5a3a9a', Dp: '#5a3a9a',
    P: '#8b3a1f', I: '#8b1f1f', Ch: '#7a4a00', Co: '#555',
    Ce: '#7a2a5a', Cp: '#1a3a5c'
  };
  return map[key] || '#333';
}
function comIcon(key) {
  const map = { pbos: '↑', ri: '⚙', metrics: '#', discovery: '?', objections: '⊘', next_steps: '→' };
  return map[key] || '·';
}

function switchTab(tab, btn) {
  document.querySelectorAll('.framework-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
}

function copyNextStep() {
  const text = document.getElementById('next-step-text')?.innerText || '';
  navigator.clipboard.writeText(text).catch(() => {});
  const btn = document.querySelector('.copy-btn');
  if (btn) { btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1500); }
}

function setActiveNav(el) {
  document.querySelectorAll('.call-nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

// ── INIT ──
buildSidebar();
showOverview(document.querySelector('.call-nav-item'));
</script>
</body>
</html>
