at across every document search in a 6-week diligence process.' Then ask: 'On your last sell-side, how much time did the team spend on document search?' Make MaryBeth do the math for her own deals."}, "value_vs_feature": {"score": "feature_led", "evidence": "The entire call was a product walkthrough — pipeline view, Document Requests, AI Insights, AskLink. MaryBeth's responses were appreciative but passive. Jack never asked what her most painful deal workflow moment looks like.", "coaching": "Before showing anything: 'Before I walk you through the platform — is there a specific process coming up, or a moment from your last deal where you thought, this should be easier?' That determines whether this is a demo or an evaluation."}, "meddpicccc_scores": {"M": "missing", "E": "missing", "Dc": "missing", "Dp": "missing", "P": "na", "I": "partial", "Ch": "missing", "Co": "partial", "Ce": "missing", "Cp": "missing"}, "meddpicccc_coaching": {"M": "Land the gym story with a number: '20 minutes manually vs. 10 seconds with AskLink. On a 5-week sell-side with a team of 4 analysts, that's meaningful time back.'", "E": "MaryBeth's decision-making authority never established. 'When Piper Sandler selects a VDR for a deal — is that a banker-by-banker decision, or is there a platform lead?'", "Dc": "'Beyond the layout — when you're choosing a data room, what are the one or two things that would make you go back to a platform vs. try something else?'", "Dp": "'Is the VDR selection your call for your deals, or does Piper Sandler have a preferred vendor arrangement?'", "P": "No live deal — paper process not applicable. Once a deal is identified: 'Any IT or compliance approval needed, or can you just spin it up?'", "I": "MaryBeth surfaced one real pain: 'searching through documents can definitely take longer.' Jack validated but didn't probe depth or frequency.", "Ch": "'Who else at Piper Sandler should see this? Is there a senior banker or head of capital markets who'd want to know abou  to go on DealCentre. Madison's goal was to walk Calvin through key differentiators and get him set up with access.", "summary": "Madison ran a technically strong transition call — good product knowledge, appropriate sequencing, and a clean close on getting Calvin access the same day. The coaching opportunity: this call was almost entirely feature-led. Calvin never learned what DealCentre makes possible for Guggenheim's deal teams that wasn't possible before. The AI story was partially sharp (sovereign model vs. Datasite introduced correctly) but never connected to a specific Guggenheim workflow pain.", "sf_stage": "Define & Validate Solution", "estimated_arr": 42000, "close_quarter": "Q2 2026", "q2_signal": "amber", "q2_label": "Possible Q2", "q2_reason": "DTE contract sunset creates adoption pressure, all new deals going to DealCentre, Calvin has same-day access — depends on deal flow timing", "ai_story": {"came_up": true, "sharp_or_generic": "partially_sharp", "how_handled": "Madison introduced the AI backstory early and correctly — seven years of in-house development, no external licenses, no separate downloads. She contrasted with Datasite's acquisition model without naming them explicitly. But the AI section was feature-led with no connection to a Guggenheim deal pain.", "coaching": "The sovereign AI backstory and Datasite contrast are good — keep those. The gap is connecting AI to a Guggenheim-specific workflow moment. Before showing AI Insights: 'Calvin, on your last deal — when the client started data dumping into the prep room, how did your team figure out what was there and what was still missing?' That answer is the setup for AI Insights as the solution."}, "value_vs_feature": {"score": "feature_led", "evidence": "The entire call was a structured product walkthrough — deal creation, prep room, templates, AI Insights, AskLink, permissions, analytics. Calvin's responses were enthusiastic ('incredible,' 'seamless transition') but based on feature impression const MEDD_LABELS = {M:'Metrics',E:'Economic Buyer',Dc:'Decision Criteria',Dp:'Decision Process',P:'Paper Process',I:'Identified Pain',Ch:'Champion',Co:'Competition',Ce:'Compelling Event',Cp:'Closing Plan'};

let filters = {rep:'all',signal:'all',stage:'all',search:''};
let currentView = 'exec';

function q2color(s){return s==='green'?'var(--green)':s==='amber'?'var(--gold)':'var(--red)';}
function q2bg(s){return s==='green'?'var(--green-light)':s==='amber'?'var(--amber-light)':'var(--red-light)';}
function q2border(s){return s==='green'?'#b8d9c8':s==='amber'?'#f0d9a8':'#f0c0c0';}
function sc(s){return s>=70?'var(--green)':s>=50?'var(--amber)':'var(--red)';}
function tc(s){return s>=60?'var(--purple)':s>=35?'var(--amber)':'var(--red)';}
function fmtArr(v){if(!v||v===0)return '—';return '$'+Number(v).toLocaleString();}
function spClass(s){return 'sp-'+(s||'na');}
function spLabel(s){return{strong:'Strong',partial:'Partial',missing:'Missing',na:'N/A'}[s]||'N/A';}
function aiClass(s){return{sharp:'ai-sharp',partially_sharp:'ai-partial',generic:'ai-generic','n/a':'ai-na'}[s]||'ai-na';}
function aiPillClass(s){return{sharp:'p-sharp',partially_sharp:'p-partial',generic:'p-generic','n/a':'p-na'}[s]||'p-na';}
function aiLabel(s){return{sharp:'Sharp ✓',partially_sharp:'Partially Sharp',generic:'Generic ✗','n/a':'Not Raised'}[s]||s;}
function aiLabelShort(s){return{sharp:'Sharp',partially_sharp:'Partial',generic:'Generic','n/a':'Not Raised'}[s]||s;}

// Init badges
const closeable = CALLS.filter(c=>c.q2_signal==='green').length;
const possible = CALLS.filter(c=>c.q2_signal==='amber').length;
document.getElementById('q2-badge').textContent = `Q2: ${closeable}🟢 ${possible}🟡`;

function getFiltered(){
  return CALLS.filter(c=>{
    if(filters.rep!=='all' && c.rep!==filters.rep) return false;
    if(filters.signal!=='all' && c.q2_signal!==filters.signal) return false;
    if(filters.stage!=='all' && c.sf_stage!==filters.stage) return false;
    if(filters.search){
      const s=filters.search.toLowerCase();
      if(!c.account.toLowerCase().includes(s) && !c.rep.toLowerCase().includes(s)) return false;
    }
    return true;
  });
}

function applyFilters(){
  filters.rep=document.getElementById('f-rep')?.value||'all';
  filters.signal=document.getElementById('f-signal')?.value||'all';
  filters.stage=document.getElementById('f-stage')?.value||'all';
  filters.search=document.getElementById('f-search')?.value||'';
  if(currentView==='exec') renderExec();
  else if(currentView==='calls') renderCalls();
  else renderCoaching();
}

function showView(v,el){
  currentView=v;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('on'));
  if(el) el.classList.add('on');
  if(v==='exec') renderExec();
  else if(v==='calls') renderCalls();
  else renderCoaching();
}

function renderFilterBar(filtered){
  const reps=[...new Set(CALLS.map(c=>c.rep))].filter(Boolean).sort();
  const stages=[...new Set(CALLS.map(c=>c.sf_stage))].filter(Boolean).sort();
  return `<div class="filter-bar">
    <span class="filter-label">Filter:</span>
    <select class="filter-select" id="f-rep" onchange="applyFilters()">
      <option value="all">All Reps</option>
      ${reps.map(r=>`<option value="${r}" ${filters.rep===r?'selected':''}>${r}</option>`).join('')}
    </select>
    <select class="filter-select" id="f-signal" onchange="applyFilters()">
      <option value="all">All Signals</option>
      <option value="green" ${filters.signal==='green'?'selected':''}>🟢 Closeable</option>
      <option value="amber" ${filters.signal==='amber'?'selected':''}>🟡 Possible</option>
      <option value="red" ${filters.signal==='red'?'selected':''}>🔴 Unlikely</option>
    </select>
    <select class="filter-select" id="f-stage" onchange="applyFilters()">
      <option value="all">All Stages</option>
      ${stages.map(s=>`<option value="${s}" ${filters.stage===s?'selected':''}>${s}</option>`).join('')}
    </select>
    <input type="text" class="filter-search" id="f-search" placeholder="Search account or rep..." value="${filters.search}" oninput="applyFilters()">
    <span class="filter-count">${filtered.length} deals</span>
  </div>`;
}

function renderExec(){
  const filtered=getFiltered();
  const green=filtered.filter(c=>c.q2_signal==='green');
  const amber=filtered.filter(c=>c.q2_signal==='amber');
  const red=filtered.filter(c=>c.q2_signal==='red');
  const gArr=green.reduce((a,c)=>a+(c.estimated_arr||0),0);
  const aArr=amber.reduce((a,c)=>a+(c.estimated_arr||0),0);
  const reps=[...new Set(filtered.map(c=>c.rep))].filter(Boolean);
  const avgScore=filtered.length?Math.round(filtered.reduce((a,c)=>a+(c.overall_score||0),0)/filtered.length):0;

  document.getElementById('main').innerHTML=`
    <div class="exec-header">
      <div class="exec-title">Deal Dashboard</div>
      <div class="exec-sub">Q2 2026 Pipeline · 33 real Intralinks calls · AI-analyzed</div>
    </div>
    ${renderFilterBar(filtered)}
    <div class="kpi-strip">
      <div class="kpi k-green"><div class="kpi-num" style="color:var(--green)">${green.length}</div><div class="kpi-label">Closeable Q2<br>${fmtArr(gArr)}</div></div>
      <div class="kpi k-amber"><div class="kpi-num" style="color:var(--gold)">${amber.length}</div><div class="kpi-label">Possible Q2<br>${fmtArr(aArr)}</div></div>
      <div class="kpi k-red"><div class="kpi-num" style="color:var(--red)">${red.length}</div><div class="kpi-label">Unlikely Q2</div></div>
      <div class="kpi k-blue"><div class="kpi-num" style="color:var(--accent)">${fmtArr(gArr+aArr)}</div><div class="kpi-label">Q2 Pipeline ARR</div></div>
      <div class="kpi k-purple"><div class="kpi-num" style="color:var(--purple)">${reps.length}</div><div class="kpi-label">Active Reps</div></div>
      <div class="kpi k-grey"><div class="kpi-num" style="color:${sc(avgScore)}">${avgScore}</div><div class="kpi-label">Avg Call Score</div></div>
    </div>
    ${renderCrossTeamThemes()}
    ${renderQ2Section('🟢 Closeable Q2',green,'green')}
    ${renderQ2Section('🟡 Possible Q2',amber,'amber')}
    ${renderQ2Section('🔴 Unlikely Q2',red,'red')}`;
}

function renderCrossTeamThemes(){
  // Computed from all 33 calls
  const aiCameUp = CALLS.filter(c=>c.ai_story?.came_up).length; // 14
  const aiSharp = CALLS.filter(c=>c.ai_story?.sharp_or_generic==='sharp').length; // 1
  const aiPartial = CALLS.filter(c=>c.ai_story?.sharp_or_generic==='partially_sharp').length; // 8
  const aiGeneric = CALLS.filter(c=>c.ai_story?.sharp_or_generic==='generic').length; // 4

  const valueLed = CALLS.filter(c=>c.value_vs_feature?.score==='value_led').length; // 8
  const featureLed = CALLS.filter(c=>c.value_vs_feature?.score==='feature_led').length; // 8
  const mixed = CALLS.filter(c=>c.value_vs_feature?.score==='mixed').length; // 17

  const avgTransition = Math.round(CALLS.reduce((a,c)=>a+(c.transition_score||0),0)/CALLS.length); // 32
  const transitionAbove60 = CALLS.filter(c=>(c.transition_score||0)>=60).length; // 2

  const avgMultithread = Math.round(CALLS.reduce((a,c)=>a+(c.multithread_score||0),0)/CALLS.length); // 28
  const multithreadAbove50 = CALLS.filter(c=>(c.multithread_score||0)>=50).length; // 3

  const cpStrong = CALLS.filter(c=>c.meddpicccc_scores?.Cp==='strong').length; // 4
  const cpMissing = CALLS.filter(c=>c.meddpicccc_scores?.Cp==='missing').length; // 13

  const avgScore = Math.round(CALLS.reduce((a,c)=>a+(c.overall_score||0),0)/CALLS.length); // 54

  const themes=[
    {
      icon:'🤖',
      bg:'#e8eef5',
      lead:'The AI story is being told inconsistently.',
      text:` AI came up on ${aiCameUp} of ${CALLS.length} calls. Of those, only 1 (Inovia/Paul) told a fully sharp, sovereignty-grounded story. ${aiPartial} were partially sharp, and ${aiGeneric} were generic with no stack control argument. The two questions every rep must answer: where does your data go during AI processing, and who controls the stack? For Intralinks the answer is SS&C controls everything — model, fine-tuning, hosting, all inside the perimeter.`
    },
    {
      icon:'📊',
      bg:'#e6f2ec',
      lead:'Value-vs-feature is the sharpest coaching lever.',
      text:` Only ${valueLed} of ${CALLS.length} calls were value-led. ${featureLed} were feature-led and ${mixed} were mixed. The value-led calls (US Bank, EnCap, PSC, Inovia, Amentum) averaged a score of ${Math.round(CALLS.filter(c=>c.value_vs_feature?.score==='value_led').reduce((a,c)=>a+(c.overall_score||0),0)/valueLed)} vs. ${Math.round(CALLS.filter(c=>c.value_vs_feature?.score==='feature_led').reduce((a,c)=>a+(c.overall_score||0),0)/featureLed)} for feature-led calls. Reps who asked one discovery question before demoing consistently produced better outcomes.`
    },
    {
      icon:'🔄',
      bg:'#f0ebfa',
      lead:'The transition motion is underdeveloped across the board.',
      text:` Average transition score across all ${CALLS.length} calls is ${avgTransition}/100. Only ${transitionAbove60} calls scored above 60 (EnCap and Globalfoundries). No rep consistently framed the VDR as an entry point and set up a specific platform conversation with a date. This is the team's biggest upsell motion — and it's being left on the table in nearly every call.`
    },
    {
      icon:'🔗',
      bg:'#fdf3e3',
      lead:'Multi-threading is almost entirely absent.',
      text:` Average multi-thread score is ${avgMultithread}/100. Only ${multithreadAbove50} calls scored above 50 (US Bank at 75, Amentum at 55, Behrman at 50). The majority of calls stayed with a single contact and never mapped the broader stakeholder landscape. Platform infrastructure deals require champions at multiple levels — this gap is directly correlated with lower close rates.`
    },
    {
      icon:'🏁',
      bg:'#fdeaea',
      lead:'Closing discipline separates the top calls from the rest.',
      text:` Only ${cpStrong} of ${CALLS.length} calls had a strong closing plan. ${cpMissing} had no closing plan at all. The top-scoring calls (US Bank 82, PSC 72, EnCap 71) all ended with a specific date and defined next action. The bottom calls universally closed with vague language — "I'll follow up," "let's grab coffee," or no next step at all.`
    }
  ];

  return `<div class="themes-section">
    <div class="themes-hdr">
      <div class="themes-hdr-title">Cross-Team Themes</div>
      <div class="themes-hdr-sub">${CALLS.length} calls · Q2 2026</div>
    </div>
    ${themes.map(t=>`<div class="theme-item">
      <div class="theme-icon-wrap" style="background:${t.bg}">${t.icon}</div>
      <div class="theme-content"><strong>${t.lead}</strong>${t.text}</div>
    </div>`).join('')}
  </div>`;
}

function renderQ2Section(title,calls,signal){
  if(!calls.length) return '';
  const arr=calls.reduce((a,c)=>a+(c.estimated_arr||0),0);
  return `<div class="q2-section">
    <div class="q2-section-hdr">
      <div class="q2-dot" style="background:${q2color(signal)}"></div>
      <div class="q2-section-title">${title}</div>
      <div class="q2-section-count">${calls.length} deal${calls.length!==1?'s':''}</div>
      ${arr>0?`<div class="q2-section-arr" style="color:${q2color(signal)}">${fmtArr(arr)}</div>`:''}
    </div>
    <table class="deal-table">
      <thead><tr>
        <th>Account</th><th>Rep</th><th>Stage</th><th>ARR</th><th>Score</th><th style="width:80px">AI Story</th><th>Signal</th>
      </tr></thead>
      <tbody>
        ${calls.map(c=>`<tr onclick="openPanel(${JSON.stringify(c.account).replace(/"/g,'&quot;')})">
          <td><div class="tbl-account">${c.account}</div><div class="tbl-rep">${c.date}</div></td>
          <td><div class="tbl-rep">${c.rep}</div></td>
          <td><span class="tbl-stage">${c.sf_stage}</span></td>
          <td class="tbl-arr">${fmtArr(c.estimated_arr)}</td>
          <td><span class="score-pill" style="color:${sc(c.overall_score)}">${c.overall_score}</span></td>
          <td><span class="ai-pill ${aiPillClass(c.ai_story?.sharp_or_generic)}">${aiLabelShort(c.ai_story?.sharp_or_generic)}</span></td>
          <td><div class="tbl-signal" style="color:${q2color(c.q2_signal)}"><div class="sig-dot" style="background:${q2color(c.q2_signal)}"></div>${c.q2_reason}</div></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function renderCalls(){
  const filtered=getFiltered();
  document.getElementById('main').innerHTML=`
    <div style="margin-bottom:20px"><div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:4px">All Calls</div>
    <div style="font-size:13px;color:var(--ink-3)">Click any call to view full AI coaching analysis</div></div>
    ${renderFilterBar(filtered)}
    <table class="deal-table">
      <thead><tr><th>Account</th><th>Rep</th><th>Date</th><th>Duration</th><th>Stage</th><th>Score</th><th>AI Story</th><th>Q2</th></tr></thead>
      <tbody>
        ${filtered.map(c=>`<tr onclick="openPanel(${JSON.stringify(c.account).replace(/"/g,'&quot;')})">
          <td><div class="tbl-account">${c.account}</div></td>
          <td>${c.rep}</td>
          <td style="font-family:'DM Mono',monospace;font-size:11px">${c.date}</td>
          <td style="font-family:'DM Mono',monospace;font-size:11px">${c.duration}</td>
          <td><span class="tbl-stage">${c.sf_stage}</span></td>
          <td><span class="score-pill" style="color:${sc(c.overall_score)}">${c.overall_score}</span></td>
          <td><span class="ai-pill ${aiPillClass(c.ai_story?.sharp_or_generic)}">${aiLabelShort(c.ai_story?.sharp_or_generic)}</span></td>
          <td><div class="tbl-signal" style="color:${q2color(c.q2_signal)}"><div class="sig-dot" style="background:${q2color(c.q2_signal)}"></div>${c.q2_label}</div></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function renderCoaching(){
  const sorted=[...CALLS].sort((a,b)=>b.overall_score-a.overall_score);
  document.getElementById('main').innerHTML=`
    <div style="margin-bottom:20px"><div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:4px">Team Coaching</div>
    <div style="font-size:13px;color:var(--ink-3)">All 13 calls analyzed · Sorted by score</div></div>
    <table class="deal-table">
      <thead><tr><th>Account</th><th>Rep</th><th>Score</th><th>AI Story</th><th>Value vs Feature</th><th>Transition</th><th>Multi-Thread</th><th>Top Priority</th></tr></thead>
      <tbody>
        ${sorted.map(c=>`<tr onclick="openPanel(${JSON.stringify(c.account).replace(/"/g,'&quot;')})">
          <td><div class="tbl-account">${c.account}</div><div class="tbl-rep">${c.date}</div></td>
          <td>${c.rep}</td>
          <td><span class="score-pill" style="color:${sc(c.overall_score)}">${c.overall_score}</span></td>
          <td><span class="ai-pill ${aiPillClass(c.ai_story?.sharp_or_generic)}">${aiLabelShort(c.ai_story?.sharp_or_generic)}</span></td>
          <td style="font-size:12px">${c.value_vs_feature?.score==='value_led'?'✅ Value-Led':c.value_vs_feature?.score==='feature_led'?'❌ Feature-Led':'⚠️ Mixed'}</td>
          <td><span style="font-family:'DM Mono',monospace;font-size:12px;color:${tc(c.transition_score)}">${c.transition_score}</span></td>
          <td><span style="font-family:'DM Mono',monospace;font-size:12px;color:${tc(c.multithread_score)}">${c.multithread_score}</span></td>
          <td style="font-size:12px;color:var(--ink-2);max-width:200px">${(c.top_priorities||[])[0]||'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

function openPanel(account){
  const c=CALLS.find(x=>x.account===account);
  if(!c) return;
  document.getElementById('panel-title').textContent=c.account;
  document.getElementById('panel-sub').textContent=`${c.all_reps} · ${c.date} · ${c.duration}`;
  document.getElementById('panel-overlay').classList.add('show');
  document.getElementById('coaching-panel').classList.add('open');

  const ai=c.ai_story||{};
  const scores=c.meddpicccc_scores||{};
  const coaching=c.meddpicccc_coaching||{};
  const s=c.overall_score||0;
  const ts=c.transition_score||0;
  const mts=c.multithread_score||0;
  const medd=Object.values(scores).length?Math.round(Object.values(scores).reduce((a,v)=>a+(v==='strong'?10:v==='partial'?5:v==='na'?10:0),0)/(Object.values(scores).length*10)*100):0;

  document.getElementById('panel-body').innerHTML=`
    <div class="p-q2-box" style="background:${q2bg(c.q2_signal)};border:1px solid ${q2border(c.q2_signal)}">
      <div class="p-q2-dot" style="background:${q2color(c.q2_signal)}"></div>
      <div>
        <div class="p-q2-label" style="color:${q2color(c.q2_signal)}">${c.q2_label}</div>
        <div class="p-q2-text" style="color:${q2color(c.q2_signal)}">${c.q2_reason}</div>
      </div>
    </div>

    <div class="p-sl-strip" style="grid-template-columns:1fr 1fr 1fr">
      <div class="p-sl-card" style="grid-column:span 3;display:grid;grid-template-columns:1fr 1fr;gap:10px;background:transparent;border:none;padding:0;border-top:none;">
        <div class="p-sl-card"><div class="p-sl-label">SF Stage (as of call)</div><div class="p-sl-value">${c.sf_stage}</div></div>
        <div class="p-sl-card" style="border-top-color:${c.recommended_stage===c.sf_stage?'var(--accent)':c.recommended_stage==='Cancellation Pending'?'var(--red)':'var(--gold)'}">
          <div class="p-sl-label" style="color:${c.recommended_stage===c.sf_stage?'var(--ink-4)':c.recommended_stage==='Cancellation Pending'?'var(--red)':'var(--amber)'}">AI Recommended Stage</div>
          <div class="p-sl-value" style="color:${c.recommended_stage===c.sf_stage?'var(--ink)':c.recommended_stage==='Cancellation Pending'?'var(--red)':'var(--amber)'}">${c.recommended_stage||c.sf_stage}${c.recommended_stage&&c.recommended_stage!==c.sf_stage?' ↑':''}</div>
        </div>
      </div>
      <div class="p-sl-card"><div class="p-sl-label">Est. ARR</div><div class="p-sl-value">${fmtArr(c.estimated_arr)}</div></div>
      <div class="p-sl-card"><div class="p-sl-label">Close Quarter</div><div class="p-sl-value">${c.close_quarter||'Unknown'}</div></div>
      <div class="p-sl-card" style="background:transparent;border:none;border-top:none;"></div>
    </div>

    <div class="p-scores">
      <div class="p-score"><div class="p-score-num" style="color:${sc(s)}">${s}</div><div class="p-score-label">Overall</div></div>
      <div class="p-score"><div class="p-score-num" style="color:${sc(medd)}">${medd}</div><div class="p-score-label">MEDDPICCCC</div></div>
      <div class="p-score" style="background:var(--purple-light);border:1px solid #c0a8e0"><div class="p-score-num" style="color:${tc(ts)}">${ts}</div><div class="p-score-label" style="color:var(--purple)">Transition</div></div>
      <div class="p-score" style="background:var(--teal-light);border:1px solid #a0cece"><div class="p-score-num" style="color:${tc(mts)}">${mts}</div><div class="p-score-label" style="color:var(--teal)">Multi-Thread</div></div>
    </div>

    <div class="p-summ">
      <div class="p-summ-label">Deal Context</div>
      <div class="p-summ-text" style="font-size:11px;color:var(--ink-3);font-family:'DM Mono',monospace;margin-bottom:8px">${c.deal_context||''}</div>
      <div class="p-summ-label">Coaching Summary</div>
      <div class="p-summ-text">${c.summary||''}</div>
    </div>

    ${ai.how_handled?`<div class="ai-block ${aiClass(ai.sharp_or_generic||'n/a')}">
      <div class="ai-hdr"><div class="ai-title">🤖 AI Story</div><span class="ai-pill ${aiPillClass(ai.sharp_or_generic||'n/a')}">${aiLabel(ai.sharp_or_generic||'n/a')}</span></div>
      <div class="ai-body">${ai.how_handled}</div>
      <div class="ai-coach-block">${ai.coaching||''}</div>
    </div>`:''}

    <div class="p-two-col">
      <div class="p-wins"><div class="p-col-label">✓ Top Wins</div>${(c.top_wins||[]).map(w=>`<div class="p-li"><div class="p-li-dot dot-g"></div><div>${w}</div></div>`).join('')}</div>
      <div class="p-pris"><div class="p-col-label">↑ Top Priorities</div>${(c.top_priorities||[]).map(p=>`<div class="p-li"><div class="p-li-dot dot-a"></div><div>${p}</div></div>`).join('')}</div>
    </div>

    ${c.top_multithread_action?`<div class="multithread-box">
      <div class="mt-label">🔗 Top Multi-Thread Action</div>
      <div class="mt-action">${c.top_multithread_action}</div>
    </div>`:''}

    ${c.suggested_next_step?`<div class="p-nxt">
      <div class="p-nxt-label">Suggested Next Step</div>
      <div class="p-nxt-text" id="p-nst">${c.suggested_next_step}</div>
      <button class="p-copy" onclick="copyNST()">Copy</button>
    </div>`:''}

    <div class="p-tabs">
      <button class="p-tab on" onclick="switchPTab('medd',this)">MEDDPICCCC</button>
      <button class="p-tab" onclick="switchPTab('vf',this)">Value vs Feature</button>
      <button class="p-tab" onclick="switchPTab('tr',this)">Transition & Threading</button>
    </div>

    <div class="p-tab-section show" id="ptab-medd">
      ${Object.entries(MEDD_LABELS).map(([k,l])=>{
        const st=scores[k]||'na';const co=coaching[k]||'';
        return `<div class="p-fw-item">
          <div class="p-fw-key" style="color:${MEDD_COLORS[k]||'#333'}">${k}</div>
          <div>
            <div class="p-fw-hdr"><div class="p-fw-lbl">${l}</div><span class="sp ${spClass(st)}">${spLabel(st)}</span></div>
            ${co?`<div class="p-coach p-coach-${st}">${co}</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="p-tab-section" id="ptab-vf">
      <div style="background:var(--surface);border-radius:6px;padding:14px;margin-bottom:10px">
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-4);text-transform:uppercase;margin-bottom:6px">Value vs Feature Score</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:8px">${c.value_vs_feature?.score==='value_led'?'✅ Value-Led':c.value_vs_feature?.score==='feature_led'?'❌ Feature-Led':'⚠️ Mixed'}</div>
        <div style="font-size:12px;color:var(--ink-2);line-height:1.6;margin-bottom:8px">${c.value_vs_feature?.evidence||''}</div>
        <div style="background:var(--amber-light);border-left:2px solid var(--gold);padding:8px 10px;border-radius:3px;font-size:11px;color:var(--amber)">${c.value_vs_feature?.coaching||''}</div>
      </div>
    </div>

    <div class="p-tab-section" id="ptab-tr">
      <div style="background:var(--surface);border-radius:7px;padding:14px;margin-bottom:10px">
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-4);text-transform:uppercase;margin-bottom:4px">Transition Score · VDR → DCAI/FundCentre</div>
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:${tc(ts)}">${ts}</div>
        <div style="font-size:12px;color:var(--ink-2);margin-top:4px">${c.transition_summary||''}</div>
      </div>
      <div style="background:var(--purple-light);border-radius:7px;padding:14px">
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--purple);text-transform:uppercase;margin-bottom:4px">Multi-Thread Score</div>
        <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:${tc(mts)}">${mts}</div>
        <div style="font-size:12px;color:var(--ink-2);margin-top:4px">${c.multithread_summary||''}</div>
      </div>
    </div>`;
}

function switchPTab(tab,btn){
  document.querySelectorAll('.p-tab-section').forEach(s=>s.classList.remove('show'));
  document.querySelectorAll('.p-tab').forEach(b=>b.classList.remove('on'));
  document.getElementById('ptab-'+tab)?.classList.add('show');
  btn.classList.add('on');
}

function closePanel(){
  document.getElementById('panel-overlay').classList.remove('show');
  document.getElementById('coaching-panel').classList.remove('open');
}

function copyNST(){
  const t=document.getElementById('p-nst')?.innerText||'';
  navigator.clipboard.writeText(t).catch(()=>{});
  const b=document.querySelector('.p-copy');
  if(b){b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1500);}
}

// Init
renderExec();
</script>
</body>
</html>
